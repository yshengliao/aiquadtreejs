name: Publish to npm

# Triggers on any pushed semver tag (v0.1.0, v0.1.1, etc.) — matches the
# trigger pattern used by aifsmjs / aiecsjs / aibridgejs.
#
# Authentication: npm Trusted Publishing via OIDC. Trusted publisher must
# be configured on npmjs.com:
#   Packages → aiquadtreejs → Settings → Publishing access → Trusted publisher
#   Repository:  yshengliao/aiquadtreejs
#   Workflow:    publish.yml
#
# Publishes with `--provenance` so the npm registry attaches a sigstore
# attestation that the tarball was built by this workflow on this commit.
#
# Manual runs (e.g. dry-run validation) are still exposed via workflow_dispatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in dry-run mode (no actual publish)"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish (node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to a version that supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test with coverage thresholds
        run: pnpm coverage

      - name: Build
        run: pnpm build

      - name: Verify package exports
        run: pnpm verify:exports

      - name: Verify llms-full.txt is in sync
        run: pnpm verify:llms

      - name: Check bundle sizes
        run: pnpm check:size

      - name: Publish (dry run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --dry-run --provenance --access public

      - name: Publish to npm via OIDC Trusted Publishing
        if: ${{ inputs.dry_run != true }}
        run: npm publish --provenance --access public
